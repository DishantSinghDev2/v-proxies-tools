name = "v-proxies-tools"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_SITE_URL = "https://tools.vproxies.app"
# Public key for client-side ECDH encryption
ECDH_PUBLIC_KEY_B64 = "BLuFeYt8WfSlxT5ACIQglasG0To7g2E1OPZ+37UzoJRbyk4YIW+rPOlMMAeMxD+eNeI9NRoTvTTNi8iwl6K3Fp4="

# Node.js backend URL (optional — CF Worker is the fallback when not set)
# PROXY_BACKEND_URL = "https://your-backend.example.com"

# Secrets — set via `wrangler secret put <NAME>` (never put real values here)
# PROXY_BACKEND_TOKEN = "<bearer-token-matching-backend-BACKEND_TOKEN>"
# ECDH_PRIVATE_KEY_JWK = "<private-key-json-from-generate-keys>"

# Custom domain (add after deploying)
# [[routes]]
# pattern = "tools.vproxies.app/*"
# zone_name = "vproxies.app"
